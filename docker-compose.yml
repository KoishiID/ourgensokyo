# =============================================================================
# Ourgensokyo BBS — Docker Compose
# =============================================================================
# Architecture: nginx (single entry point) → frontend (Vue SPA) + backend (Express API)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — 生产级数据库
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — Express.js API server (Node.js 20 Alpine)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./bbs-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - postgres
    volumes:
      # SQLite database persistence (保留至迁移验证通过)
      - ./data:/app/data
      # Uploaded files (avatars, post images)
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode===200?0:1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # No ports exposed to host — internal communication only via Docker network

  # ---------------------------------------------------------------------------
  # Frontend — Vue 3 SPA (multi-stage build → nginx:alpine)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./bbs-client
    restart: unless-stopped
    # No ports exposed to host — served through nginx proxy

  # ---------------------------------------------------------------------------
  # Nginx — Single entry point (port 80 / 443)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:

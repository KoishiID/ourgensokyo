name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ogsk
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ogsk/project
            git pull origin main
            docker compose build
            docker compose up -d
            echo "=== Healthcheck ==="
            sleep 3
            curl -sf http://localhost/api/categories > /dev/null \
              && echo "API OK" \
              || echo "API FAILED"

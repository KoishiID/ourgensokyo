# =============================================================================
# Nginx configuration for Ourgensokyo BBS
# Base image: nginx:alpine
# Single entry point proxying to frontend (Vue SPA) and backend (Express API)
# =============================================================================

# Run worker processes automatically based on available CPU cores
worker_processes auto;

events {
    # Maximum number of simultaneous connections per worker
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------------------
    # Basic settings
    # -------------------------------------------------------------------------
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # Common proxy headers — applied to all proxy_pass locations
    # -------------------------------------------------------------------------
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # -------------------------------------------------------------------------
    # HTTP server (port 80) — active, used for initial deployment and development
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # ---------- Frontend (Vue SPA) ----------
        # The frontend Docker container handles its own SPA fallback (history mode)
        # via its nginx configuration — no try_files $uri $uri/ /index.html needed here.
        location / {
            proxy_pass http://frontend:80;
        }

        # ---------- Backend API ----------
        location /api/ {
            proxy_pass http://backend:3000;
        }

        # ---------- Uploaded files ----------
        location /uploads/ {
            proxy_pass http://backend:3000;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server (port 443) — commented template for production deployment
    #
    # To enable:
    #   1. Place your Let's Encrypt (or other) certificate files on the host
    #   2. Update the ssl_certificate paths with your actual domain
    #   3. Uncomment the entire server block below
    #   4. Set up auto-renewal via certbot or acme.sh
    #
    # Note: Port 80 server above remains active for HTTP-to-HTTPS redirect
    # if desired; alternatively, you can add a return 301 https://$host$request_uri;
    # to the port 80 server after SSL is confirmed working.
    # -------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL certificate paths (Let's Encrypt standard location)
    #     ssl_certificate     /etc/letsencrypt/live/域名/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/域名/privkey.pem;
    #
    #     # Modern SSL configuration
    #     ssl_protocols             TLSv1.2 TLSv1.3;
    #     ssl_ciphers               HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # ---------- Frontend (Vue SPA) ----------
    #     location / {
    #         proxy_pass http://frontend:80;
    #     }
    #
    #     # ---------- Backend API ----------
    #     location /api/ {
    #         proxy_pass http://backend:3000;
    #     }
    #
    #     # ---------- Uploaded files ----------
    #     location /uploads/ {
    #         proxy_pass http://backend:3000;
    #     }
    # }
}

# =============================================================================
# Nginx configuration for Ourgensokyo BBS
# Base image: nginx:alpine
# Single entry point proxying to frontend (Vue SPA) and backend (Express API)
# =============================================================================

# Run worker processes automatically based on available CPU cores
worker_processes auto;

events {
    # Maximum number of simultaneous connections per worker
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------------------
    # Basic settings
    # -------------------------------------------------------------------------
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # Security headers — defense in depth
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # -------------------------------------------------------------------------
    # Rate limiting zones — defense in depth
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

    # -------------------------------------------------------------------------
    # Connection limiting
    # -------------------------------------------------------------------------
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # -------------------------------------------------------------------------
    # Buffer size hardening — prevent buffer overflow attacks
    # -------------------------------------------------------------------------
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_max_body_size 10m;

    # -------------------------------------------------------------------------
    # Common proxy headers — applied to all proxy_pass locations
    # -------------------------------------------------------------------------
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # -------------------------------------------------------------------------
    # HTTP server (port 80) — active, used for initial deployment and development
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # ---------- Frontend (Vue SPA) ----------
        # The frontend Docker container handles its own SPA fallback (history mode)
        # via its nginx configuration — no try_files $uri $uri/ /index.html needed here.
        location / {
            limit_req zone=static burst=50 nodelay;
            proxy_pass http://frontend:80;
        }

        # ---------- Backend API ----------
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 10;
            proxy_pass http://backend:3000;
        }

        # ---------- Backend API - Auth (stricter) ----------
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_conn addr 5;
            proxy_pass http://backend:3000;
        }

        # ---------- Uploaded files ----------
        location /uploads/ {
            limit_req zone=static burst=30 nodelay;
            proxy_pass http://backend:3000;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server (port 443) — commented template for production deployment
    #
    # To enable:
    #   1. Place your Let's Encrypt (or other) certificate files on the host
    #   2. Update the ssl_certificate paths with your actual domain
    #   3. Uncomment the entire server block below
    #   4. Set up auto-renewal via certbot or acme.sh
    #
    # Note: Port 80 server above remains active for HTTP-to-HTTPS redirect
    # if desired; alternatively, you can add a return 301 https://$host$request_uri;
    # to the port 80 server after SSL is confirmed working.
    # -------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL certificate paths (Let's Encrypt standard location)
    #     ssl_certificate     /etc/letsencrypt/live/域名/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/域名/privkey.pem;
    #
    #     # Modern SSL configuration
    #     ssl_protocols             TLSv1.2 TLSv1.3;
    #     ssl_ciphers               HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Security headers for HTTPS
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # ---------- Frontend (Vue SPA) ----------
    #     location / {
    #         proxy_pass http://frontend:80;
    #     }
    #
    #     # ---------- Backend API ----------
    #     location /api/ {
    #         proxy_pass http://backend:3000;
    #     }
    #
    #     # ---------- Uploaded files ----------
    #     location /uploads/ {
    #         proxy_pass http://backend:3000;
    #     }
    # }
}
